<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filza Login</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #1e1b2e;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #e5e5e5;
  margin: 0;
}

/* HALAMAN */
.page {
  display: none;
  text-align: center;
  opacity: 0;
  transition: opacity 0.5s ease;
  width: 100%;
}

.page.show {
  display: flex;
  justify-content: center;
  opacity: 1;
}

/* LOGIN BOX */
.container {
  background: #2a2640;
  padding: 40px;
  border-radius: 20px;
  width: 90%;
  max-width: 350px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}

/* RESPONSIVE HP */
@media (max-width: 480px) {
  .container {
    padding: 25px;
    border-radius: 15px;
  }

  h2 {
    font-size: 20px;
  }
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 12px;
  border: 1px solid #3b355a;
  outline: none;
  background: #1f1b33;
  color: #eee;
  transition: all 0.3s ease;
}

input::placeholder {
  color: #888;
}

/* FOCUS */
input:focus {
  border-color: #c084fc;
  box-shadow: 0 0 0 2px rgba(192,132,252,0.2),
              0 0 12px rgba(192,132,252,0.3);
  transform: scale(1.02);
}

/* BUTTON */
button {
  padding: 12px;
  width: 100%;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: #c084fc;
  color: #1e1b2e;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #a855f7;
}

/* BERHASIL */
.success {
  background: #3b355a;
  color: #d8b4fe;
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 350px;
}

/* GAGAL */
.error {
  background: #3a1f2d;
  color: #f9a8d4;
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 350px;
}
</style>
</head>

<body>

<div id="loginPage" class="page">
  <div class="container">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<div id="successPage" class="page">
  <div class="success">
    <h1>Login Berhasil</h1>
    <button onclick="kembali()">Kembali</button>
  </div>
</div>

<div id="errorPage" class="page">
  <div class="error">
    <h1>Login Gagal</h1>
    <button onclick="kembali()">Kembali</button>
  </div>
</div>

<script>
function showPage(id) {
  let pages = document.querySelectorAll(".page");

  pages.forEach(page => {
    page.classList.remove("show");
    setTimeout(() => {
      page.style.display = "none";
    }, 500);
  });

  setTimeout(() => {
    let target = document.getElementById(id);
    target.style.display = "flex";
    setTimeout(() => {
      target.classList.add("show");
    }, 10);
  }, 500);
}

showPage("loginPage");

function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if (user === "Bahrani" && pass === "332823") {
    showPage("successPage");
  } else {
    showPage("errorPage");
  }
}

function kembali() {
  showPage("loginPage");
}
</script>

</body>
</html>
